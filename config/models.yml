# PRISM — model tiering config
# Which Claude tier handles which task, and when to escalate. Mirrors §5.1 of the plan.
# Confirm exact model IDs + rates at https://platform.claude.com/docs/en/about-claude/models/overview
# (IDs and prices rev often; rates below are per MILLION tokens, input/output, mid-2026.)

models:
  haiku:
    id: claude-haiku-4-5            # confirm latest point release
    rate_per_mtok: { input: 1, output: 5 }
    role: fast, high-volume, structured
  sonnet:
    id: claude-sonnet-4-6           # confirm latest point release
    rate_per_mtok: { input: 3, output: 15 }
    role: balanced daily driver
  opus:
    id: claude-opus-4-8             # current flagship (confirmed 2026-06-09)
    rate_per_mtok: { input: 5, output: 25 }
    role: hard reasoning, design, review

defaults:
  build_time: sonnet                # most coding
  run_time: haiku                   # most in-product calls
  fallback: sonnet                  # if a chosen tier is unavailable

cost_levers:
  prompt_caching: true              # ~90% off cached input — cache the shared schema + layer catalog
  batch: true                       # ~50% off — use for ~400-layer tagging and bulk asset summaries
  prefer_terse_output: true         # output costs ~5x input — keep model outputs tight

# --- Build-time: Claude as the engineer ---
build_routing:
  scaffolding:               haiku
  boilerplate_docstrings:    haiku
  commit_messages:           haiku
  etl_sync_mirror_load:      sonnet
  postgis_loaders:           sonnet
  graph_builders:            sonnet
  visualization:             sonnet
  tests:                     sonnet
  architecture_design:       opus
  objective_function_design: opus
  asset_interface_design:    opus
  hard_debugging:            opus
  phase_gate_review:         opus
  # --- MVP2 additions (see MVP2_PLAN.md) ---
  frontend_components:       sonnet    # pages, Deck.gl layers, charts
  deckgl_3d_terrain:         sonnet    # M2 build (architecture decision itself -> opus)
  ui_copy_pass:              haiku     # ui-ux skill copy sweeps over pages
  ha_architecture_review:    opus      # M3 Redis/queue/prod topology review
  playground_design:         opus      # M4 schema + UX design review
  nl_agent_tool_design:      opus      # M5b tool-use agent design

# --- Run-time: PRISM calling Claude (Phase 7 / Phase 9) ---
runtime_routing:
  layer_classification:        haiku    # tag ~400 WFS layers into the schema
  asset_summary:               haiku
  metadata_extraction:         haiku
  record_validation:           haiku
  query_routing:               haiku
  in_app_digest:               haiku    # window.cowork.askClaude-style calls
  planning_report:             sonnet
  tradeoff_comparison:         sonnet
  risk_summary:                sonnet
  flagship_report:             opus     # the "$500M -> where" analysis a partner reads
  cross_domain_reasoning:      opus
  hidden_dependency_discovery: opus
  # --- MVP2 additions (see MVP2_PLAN.md) ---
  narrative_stream:            sonnet   # M1 SSE-streamed narratives
  playground_summary:          haiku    # M4 scorecard one-liners
  playground_comparison:       sonnet   # M4 scenario-vs-scenario narrative
  nl_query_parse:              haiku    # M5b Ask-PRISM intent + tool routing
  nl_query_answer:             sonnet   # M5b Ask-PRISM composed answer
  storm_timeline_caption:      haiku    # M5c per-timestep captions
  board_pack_report:           opus     # M5d flagship PDF narrative

# --- Escalation checkpoints (the handoffs) ---
escalation:
  bulk_to_narrative:
    from: haiku
    to: sonnet
    when: a tagged/summarized result is selected for a written report
  narrative_to_flagship:
    from: sonnet
    to: opus
    when:
      - output goes in front of engineers / planners / government
      - reasoning spans multiple infrastructure domains
      - model_confidence < 0.7
      - asset_criticality == high
  build_gate:
    to: opus
    when: a phase "Done when" gate — Opus verification pass before proceeding
  fall_back_down:
    when: a prompt pattern is proven; pin the routine high-volume version to the cheapest tier that holds quality

# --- Ollama (local / production) backend ---
# Used when PRISM_LLM_BACKEND=ollama (or auto-detected when no ANTHROPIC_API_KEY).
# PRISM_OLLAMA_MODEL env var overrides all tiers to a single model.
# PRISM_OLLAMA_BASE_URL overrides base_url (default: http://localhost:11434).
#
# Model rationale (from `ollama list` 2026-06-06):
#   qwen2.5-coder:14b  — dense 14B, coding-focused; reliable at structured JSON output → haiku bulk passes
#   qwen3.6:35b-a3b    — MoE 35B/3.6B-active, general reasoning; fast + strong narrative quality → sonnet/opus
#   qwen2.5-coder:32b  — NOT used: coding-focused, redundant given qwen3 covers reasoning better at same size
#
# qwen3 thinking mode: set think: true on a tier to prepend /think to the prompt,
# enabling Qwen3's chain-of-thought reasoning (costs more tokens, worth it for opus).
ollama:
  base_url: http://localhost:11434
  tier_models:
    haiku:
      model: qwen2.5-coder:14b
      think: false
    sonnet:
      model: qwen3.6:35b-a3b
      think: false
    opus:
      model: qwen3.6:35b-a3b
      think: true             # enables Qwen3 chain-of-thought for flagship calls

# Machine-readable thresholds the runtime router (prism/llm.py) reads to auto-escalate.
escalation_thresholds:
  confidence_below: 0.7      # bump up a tier when model confidence is under this
  criticalities: [high]      # bump up a tier for these asset criticalities
  flagship_tier: opus        # tier used when an escalation trips
  bulk_tier: haiku           # tier for high-volume passes
