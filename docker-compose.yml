services:
  postgis:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgis
    image: prism-postgis:16-3.4
    container_name: prism-postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prism}
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - prism_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prism-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - prism_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: prism-api:0.1.0
    container_name: prism-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-prism}
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "*"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PRISM_LLM_BACKEND: ${PRISM_LLM_BACKEND:-}
      PRISM_OLLAMA_MODEL: ${PRISM_OLLAMA_MODEL:-}
      PRISM_OLLAMA_BASE_URL: ${PRISM_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw/usgs_3dep:/app/data/raw/usgs_3dep:ro
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: prism-api:0.1.0
    container_name: prism-worker
    restart: unless-stopped
    command: ["arq", "api.worker.WorkerSettings"]
    # The image's HEALTHCHECK probes localhost:8000/health, which doesn't
    # exist in the worker (no HTTP server) — disable it to avoid a permanent
    # "unhealthy" status.
    healthcheck:
      disable: true
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-prism}
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PRISM_LLM_BACKEND: ${PRISM_LLM_BACKEND:-}
      PRISM_OLLAMA_MODEL: ${PRISM_OLLAMA_MODEL:-}
      PRISM_OLLAMA_BASE_URL: ${PRISM_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: prism-frontend:0.1.0
    container_name: prism-frontend
    environment:
      API_PROXY_TARGET: http://api:8000
      NEXT_PUBLIC_API_BASE: /api
    ports:
      - "3000:3000"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prism-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@prism.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-prism}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgis

