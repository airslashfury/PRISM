worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /dev/stdout json;
    error_log  /dev/stderr warn;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css
               application/geo+json application/vnd.mapbox-vector-tile;
    gzip_min_length 1024;

    upstream api_upstream {
        server api:8000;
    }

    upstream frontend_upstream {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # AI narrative streaming (SSE) — disable buffering so chunks flush immediately.
        location /api/reports/narratives/stream {
            proxy_pass http://api_upstream/reports/narratives/stream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else under /api/* -> FastAPI, stripping the /api prefix.
        location /api/ {
            proxy_pass http://api_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus scrape target (not exposed under /api).
        location /metrics {
            proxy_pass http://api_upstream/metrics;
            proxy_set_header Host $host;
        }

        # Next.js app (also proxies /api/* itself via rewrites — harmless double
        # coverage, but the rules above shortcut nginx -> api directly).
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
