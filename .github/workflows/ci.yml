name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: prism
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prism"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Lint (ruff)
        run: ruff check prism api alembic

      - name: Enable PostGIS extensions
        run: |
          PGPASSWORD=prism psql -h localhost -U prism -d prism -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          PGPASSWORD=prism psql -h localhost -U prism -d prism -c "CREATE EXTENSION IF NOT EXISTS pgrouting;" || true

      # Validates the 0001_baseline migration on a schema-only database — the
      # full pytest suite (tests/) exercises live data from the 3.6 GB mirrored
      # PostGIS dataset (see CLAUDE.md "data sovereignty") and is run locally
      # against the populated dev database, not in CI.
      - name: Alembic migration check
        run: alembic upgrade head

      - name: Verify migration is idempotent
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          API_PROXY_TARGET: http://localhost:8000
          NEXT_PUBLIC_API_BASE: /api
        run: npm run build
